apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-worker
  namespace: pulsemart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notifications-worker
  template:
    metadata:
      labels:
        app: notifications-worker
    spec:
      containers:
        - name: notifications-worker
          image: ghcr.io/example/pulsemart-notifications-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: SCHEMA_REGISTRY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: SCHEMA_REGISTRY_URL
