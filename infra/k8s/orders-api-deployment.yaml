apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: pulsemart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: orders-api
          image: ghcr.io/example/pulsemart-orders-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: SCHEMA_REGISTRY_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: SCHEMA_REGISTRY_URL
            - name: ORDERS_DB_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: ORDERS_DB_URL
            - name: ORDERS_DB_USER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: ORDERS_DB_USER
            - name: ORDERS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orders-db-secret
                  key: password
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: orders-api
  namespace: pulsemart
spec:
  selector:
    app: orders-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
