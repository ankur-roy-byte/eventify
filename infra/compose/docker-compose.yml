version: "3.9"

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:8.0.0
  restart: unless-stopped
  environment: &kafka-common-env
    CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    KAFKA_MIN_INSYNC_REPLICAS: 2
    KAFKA_NUM_PARTITIONS: 6
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

services:
  kafka1:
    <<: *kafka-common
    hostname: kafka1
    container_name: kafka1
    ports:
      - "19092:19092"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://kafka1:9092,CONTROLLER://kafka1:9093,EXTERNAL://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092,EXTERNAL://localhost:19092
      KAFKA_JMX_PORT: 9991
      KAFKA_JMX_HOSTNAME: kafka1
    volumes:
      - kafka1-data:/var/lib/kafka/data

  kafka2:
    <<: *kafka-common
    hostname: kafka2
    container_name: kafka2
    ports:
      - "29092:29092"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: PLAINTEXT://kafka2:9092,CONTROLLER://kafka2:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092,EXTERNAL://localhost:29092
      KAFKA_JMX_PORT: 9992
      KAFKA_JMX_HOSTNAME: kafka2
    volumes:
      - kafka2-data:/var/lib/kafka/data

  kafka3:
    <<: *kafka-common
    hostname: kafka3
    container_name: kafka3
    ports:
      - "39092:39092"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: PLAINTEXT://kafka3:9092,CONTROLLER://kafka3:9093,EXTERNAL://0.0.0.0:39092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9092,EXTERNAL://localhost:39092
      KAFKA_JMX_PORT: 9993
      KAFKA_JMX_HOSTNAME: kafka3
    volumes:
      - kafka3-data:/var/lib/kafka/data

  schema-registry:
    image: confluentinc/cp-schema-registry:8.0.0
    container_name: schema-registry
    restart: unless-stopped
    depends_on:
      - kafka1
      - kafka2
      - kafka3
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka1:9092,PLAINTEXT://kafka2:9092,PLAINTEXT://kafka3:9092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  connect:
    build:
      context: ./connect
      dockerfile: Dockerfile
    container_name: connect
    restart: unless-stopped
    depends_on:
      - kafka1
      - schema-registry
      - postgres
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092,kafka3:9092
      CONNECT_GROUP_ID: connect-cluster
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_CONFIG_STORAGE_TOPIC: connect-cluster.configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-cluster.offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-cluster.status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_LOG4J_ROOT_LOGLEVEL: INFO

  postgres:
    image: postgres:16
    container_name: orders-db
    restart: unless-stopped
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=10", "-c", "max_wal_senders=10"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DBZ_REPLICATION_PASSWORD: ${DBZ_REPLICATION_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      # WARNING: security plugin is disabled for local development only.
      # In staging/production, remove this line and configure TLS + admin credentials.
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"

  ksqldb-server:
    image: confluentinc/cp-ksqldb-server:8.0.0
    container_name: ksqldb-server
    restart: unless-stopped
    depends_on:
      - kafka1
      - schema-registry
    ports:
      - "8088:8088"
    environment:
      KSQL_BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092,kafka3:9092
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KSQL_KSQL_SERVICE_ID: order-platform_ksql

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: kafka-exporter
    restart: unless-stopped
    depends_on:
      - kafka1
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka1:9092"
      - "--kafka.server=kafka2:9092"
      - "--kafka.server=kafka3:9092"

  jmx-kafka1:
    image: bitnami/jmx-exporter:0.20.0
    container_name: jmx-kafka1
    restart: unless-stopped
    depends_on:
      - kafka1
    ports:
      - "7071:7071"
    environment:
      HTTP_PORT: 7071
      JMX_URL: service:jmx:rmi:///jndi/rmi://kafka1:9991/jmxrmi
      CONFIG_YML: |
        startDelaySeconds: 0
        lowercaseOutputName: true
        lowercaseOutputLabelNames: true
        rules:
          - pattern: "kafka.server<type=(.+), name=(.+)PerSec\\w*><>Count"
            name: kafka_server_$1_$2_total
            type: COUNTER
          - pattern: "kafka.server<type=(.+), name=(.+)><>Value"
            name: kafka_server_$1_$2
            type: GAUGE

  jmx-kafka2:
    image: bitnami/jmx-exporter:0.20.0
    container_name: jmx-kafka2
    restart: unless-stopped
    depends_on:
      - kafka2
    ports:
      - "7072:7072"
    environment:
      HTTP_PORT: 7072
      JMX_URL: service:jmx:rmi:///jndi/rmi://kafka2:9992/jmxrmi
      CONFIG_YML: |
        startDelaySeconds: 0
        lowercaseOutputName: true
        lowercaseOutputLabelNames: true
        rules:
          - pattern: "kafka.server<type=(.+), name=(.+)PerSec\\w*><>Count"
            name: kafka_server_$1_$2_total
            type: COUNTER
          - pattern: "kafka.server<type=(.+), name=(.+)><>Value"
            name: kafka_server_$1_$2
            type: GAUGE

  jmx-kafka3:
    image: bitnami/jmx-exporter:0.20.0
    container_name: jmx-kafka3
    restart: unless-stopped
    depends_on:
      - kafka3
    ports:
      - "7073:7073"
    environment:
      HTTP_PORT: 7073
      JMX_URL: service:jmx:rmi:///jndi/rmi://kafka3:9993/jmxrmi
      CONFIG_YML: |
        startDelaySeconds: 0
        lowercaseOutputName: true
        lowercaseOutputLabelNames: true
        rules:
          - pattern: "kafka.server<type=(.+), name=(.+)PerSec\\w*><>Count"
            name: kafka_server_$1_$2_total
            type: COUNTER
          - pattern: "kafka.server<type=(.+), name=(.+)><>Value"
            name: kafka_server_$1_$2
            type: GAUGE

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    depends_on:
      - kafka-exporter
      - jmx-kafka1
      - jmx-kafka2
      - jmx-kafka3
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka1
      - schema-registry
      - connect
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: pulsemart
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:9092,kafka2:9092,kafka3:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083

  dr-kafka1:
    image: confluentinc/cp-kafka:8.0.0
    container_name: dr-kafka1
    profiles: ["dr"]
    restart: unless-stopped
    ports:
      - "49092:49092"
    environment:
      CLUSTER_ID: ${DR_KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: 101
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 101@dr-kafka1:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://dr-kafka1:9092,CONTROLLER://dr-kafka1:9093,EXTERNAL://0.0.0.0:49092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://dr-kafka1:9092,EXTERNAL://localhost:49092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  mirror-maker2:
    image: confluentinc/cp-kafka:8.0.0
    container_name: mirror-maker2
    profiles: ["dr"]
    restart: unless-stopped
    depends_on:
      - kafka1
      - dr-kafka1
    volumes:
      - ./mm2/connect-mirror-maker.properties:/etc/kafka/mm2.properties:ro
    command: ["/bin/bash", "-c", "connect-mirror-maker /etc/kafka/mm2.properties"]

volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data:
  postgres-data:
