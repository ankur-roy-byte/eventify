global:
  scrape_interval: 15s

scrape_configs:
  - job_name: kafka_exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: kafka_jmx_brokers
    static_configs:
      - targets:
          - "jmx-kafka1:7071"
          - "jmx-kafka2:7072"
          - "jmx-kafka3:7073"

  - job_name: connect_rest
    metrics_path: /metrics
    static_configs:
      - targets: ["connect:8083"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
